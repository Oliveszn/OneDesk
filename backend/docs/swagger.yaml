basePath: /v1
definitions:
  auth.AuthResponse:
    properties:
      role:
        type: string
      tenant_id:
        type: string
      token:
        type: string
      user_id:
        type: string
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  auth.SignupRequest:
    properties:
      business_name:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  billing.PlanResponse:
    properties:
      billing_interval:
        example: monthly
        type: string
        x-nullable: true
      max_orders_per_month:
        example: 100
        type: integer
        x-nullable: true
      max_products:
        example: 50
        type: integer
        x-nullable: true
      max_users:
        description: null = unlimited
        example: 3
        type: integer
        x-nullable: true
      name:
        example: free
        type: string
      price_amount:
        example: 0
        type: number
      price_currency:
        example: NGN
        type: string
    type: object
  billing.UsageResponse:
    properties:
      orders_cap:
        example: 100
        type: integer
        x-nullable: true
      orders_used:
        example: 42
        type: integer
      plan_name:
        example: free
        type: string
      products_cap:
        example: 50
        type: integer
        x-nullable: true
      products_used:
        example: 12
        type: integer
      users_cap:
        example: 3
        type: integer
        x-nullable: true
      users_used:
        example: 2
        type: integer
    type: object
  finance.InvoiceResponse:
    properties:
      amount:
        example: 1500.5
        type: number
      invoice_id:
        example: e5f6g7h8-1234-5678-90ab-cdef12345678
        type: string
      issued_at:
        example: "2026-07-12T21:15:35Z"
        type: string
      order_id:
        example: d3b07384-d113-4956-953e-52f01f05e3d9
        type: string
      status:
        description: e.g., pending, paid, cancelled
        example: paid
        type: string
    type: object
  inventory.AdjustStockRequest:
    properties:
      delta:
        description: Can be negative (deductions) or positive (restocks)
        example: 25
        type: integer
      warehouse_id:
        example: 8f076135-d858-45ec-b9cc-0320df4ee99c
        type: string
    type: object
  inventory.CreateProductRequest:
    properties:
      name:
        example: Ergonomic Office Chair Premium
        type: string
      sku:
        example: PROD-XYZ-001
        type: string
    type: object
  inventory.CreateWarehouseRequest:
    properties:
      name:
        example: Lagos Central Distribution Hub
        type: string
    type: object
  inventory.ProductResponse:
    properties:
      name:
        example: Ergonomic Office Chair Premium
        type: string
      product_id:
        example: bc731ee0-3333-4f9e-a89c-a1d257211140
        type: string
      sku:
        example: PROD-XYZ-001
        type: string
    type: object
  inventory.StockLevelResponse:
    properties:
      product_id:
        example: bc731ee0-3333-4f9e-a89c-a1d257211140
        type: string
      quantity:
        example: 142
        type: integer
      reorder_point:
        example: 15
        type: integer
      warehouse_id:
        example: 8f076135-d858-45ec-b9cc-0320df4ee99c
        type: string
    type: object
  inventory.WarehouseResponse:
    properties:
      name:
        example: Lagos Central Distribution Hub
        type: string
      warehouse_id:
        example: 8f076135-d858-45ec-b9cc-0320df4ee99c
        type: string
    type: object
  sales.CreateCustomerRequest:
    properties:
      email:
        example: johndoe@example.com
        type: string
      name:
        example: John Doe
        type: string
    type: object
  sales.CreateOrderRequest:
    properties:
      customer_id:
        example: a4b6c8d0-1234-5678-90ab-cdef12345678
        type: string
      items:
        items:
          $ref: '#/definitions/sales.OrderItemRequest'
        type: array
    type: object
  sales.CustomerResponse:
    properties:
      customer_id:
        example: a4b6c8d0-1234-5678-90ab-cdef12345678
        type: string
      email:
        example: johndoe@example.com
        type: string
      name:
        example: John Doe
        type: string
    type: object
  sales.OrderItemRequest:
    properties:
      product_id:
        example: bc731ee0-3333-4f9e-a89c-a1d257211140
        type: string
      quantity:
        example: 2
        type: integer
      unit_price:
        description: Client-supplied; no pricing catalog yet
        example: 25000
        type: number
      warehouse_id:
        example: 8f076135-d858-45ec-b9cc-0320df4ee99c
        type: string
    type: object
  sales.OrderItemResponse:
    properties:
      product_id:
        example: bc731ee0-3333-4f9e-a89c-a1d257211140
        type: string
      quantity:
        example: 2
        type: integer
      unit_price:
        example: 25000
        type: number
      warehouse_id:
        example: 8f076135-d858-45ec-b9cc-0320df4ee99c
        type: string
    type: object
  sales.OrderResponse:
    properties:
      customer_id:
        example: a4b6c8d0-1234-5678-90ab-cdef12345678
        type: string
      items:
        items:
          $ref: '#/definitions/sales.OrderItemResponse'
        type: array
      order_id:
        example: d3b07384-d113-4956-953e-52f01f05e3d9
        type: string
      status:
        description: e.g., pending, fulfilled, stock_issue
        example: fulfilled
        type: string
      total:
        example: 50000
        type: number
    type: object
  tenancy.TenantResponse:
    properties:
      created_at:
        type: string
      name:
        type: string
      tenant_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Multi-tenant REP system for OneDesk.
  title: OneDesk API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Verifies user credentials and issues a JWT access token.
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid email or password
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate user
      tags:
      - auth
  /billing/usage:
    get:
      description: Fetches real-time transaction, item tracking, and staff identity
        usage statistics against plan cap thresholds.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/billing.UsageResponse'
        "401":
          description: missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "402":
          description: plan metric consumption limitation ceiling reached
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal service persistence layer failure
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get tenant quota consumption
      tags:
      - billing
  /plans:
    get:
      description: Returns a matrix layout of all structural subscription plan capabilities
        and resource limits.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/billing.PlanResponse'
            type: array
        "500":
          description: internal server error context details
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List pricing tier catalogs
      tags:
      - billing
  /tenants:
    post:
      consumes:
      - application/json
      description: Creates a new business tenant profile along with its initial root
        admin account.
      parameters:
      - description: Signup Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: invalid request body / validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: email already registered
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new tenant
      tags:
      - auth
  /tenants/me:
    get:
      description: Retrieves structural information about the authenticated user's
        tenant account context.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/tenancy.TenantResponse'
        "401":
          description: missing tenant context / unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current tenant profile
      tags:
      - tenancy
  /v1/customers:
    get:
      description: Returns all customer profiles matching the active tenant organizational
        boundary.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/sales.CustomerResponse'
            type: array
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal service database lookup fault
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List tenant customer accounts
      tags:
      - sales
    post:
      consumes:
      - application/json
      description: Registers a new customer account record attached to the current
        active tenant workspace.
      parameters:
      - description: Customer details input parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sales.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/sales.CustomerResponse'
        "400":
          description: Invalid payload data syntax or missing required fields
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new customer profile
      tags:
      - sales
  /v1/invoices:
    get:
      description: Returns all issued invoices bound to the current tenant context.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/finance.InvoiceResponse'
            type: array
        "401":
          description: Missing valid tenant credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal service database ledger query fault
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List tenant invoice ledger records
      tags:
      - finance
  /v1/invoices/{invoiceId}:
    get:
      description: Retrieves structural billing components, settlement balance quantities,
        and paid statuses for a specific invoice.
      parameters:
      - description: System invoice tracking index token (UUID)
        in: path
        name: invoiceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finance.InvoiceResponse'
        "400":
          description: Malformed route sequence path ID value format
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No invoice record matches the specified balance trace token
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal service ledger entity retrieval database error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get details of an invoice
      tags:
      - finance
  /v1/invoices/{invoiceId}/pay:
    patch:
      description: Transitions an open invoice state to paid.
      parameters:
      - description: System invoice tracking index token (UUID)
        in: path
        name: invoiceId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/finance.InvoiceResponse'
        "400":
          description: Malformed route sequence path ID value format
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No invoice record matches the specified balance trace token
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal service balance modification execution pipeline error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Process invoice settlement payment
      tags:
      - finance
  /v1/orders:
    post:
      consumes:
      - application/json
      description: Submits a sales checkout request, consumes monthly plan order entitlement
        quotas, and runs transactional inventory stock deductions.
      parameters:
      - description: Order checklist containing items list details mapping
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/sales.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/sales.OrderResponse'
        "400":
          description: Invalid references or schema entity fields input data validation
            errors
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Active monthly plan order transaction cap limit exhausted
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Order registered but partial stock depletion triggered a fallback
            state
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Place a new sales order
      tags:
      - sales
  /v1/orders/{orderId}:
    get:
      description: Fetches the comprehensive order composition manifest, settlement
        pricing math summaries, and current routing lifecycle status tags.
      parameters:
      - description: System transaction reference token lookup ID (UUID)
        in: path
        name: orderId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/sales.OrderResponse'
        "400":
          description: Malformed track sequence path identifier value format
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No transactional invoice matches the specified trace index
            ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Core data repository extraction execution block runtime failure
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get details of a sales order
      tags:
      - sales
  /v1/products:
    get:
      description: Provides full product catalog metrics visibility owned by the matching
        business group profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/inventory.ProductResponse'
            type: array
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Core relational lookup tracking query fault context
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List catalog tracking records
      tags:
      - inventory
    post:
      consumes:
      - application/json
      description: Adds a unique tracking product variant profile under the current
        client scope. Enforces item ceiling controls.
      parameters:
      - description: Product registration data template
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inventory.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/inventory.ProductResponse'
        "400":
          description: Invalid structural input payload values
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Product catalog resource entitlement quota exhausted
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: SKU code entry collision matching active entity records
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a product item
      tags:
      - inventory
  /v1/products/{productId}/stock:
    get:
      description: Returns current stock level breakdowns and reorder triggers across
        all operational warehouse points.
      parameters:
      - description: Target inventory resource look up track key ID (UUID)
        in: path
        name: productId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/inventory.StockLevelResponse'
            type: array
        "400":
          description: Malformed route identification parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No item registration matches the requested ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal query execution layer exception structural crash
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get product stock levels
      tags:
      - inventory
  /v1/products/{productId}/stock/adjust:
    post:
      consumes:
      - application/json
      description: Mutates available balance counts up or down across distinct warehouses.
        Rejects operations that result in a negative total.
      parameters:
      - description: Target catalog item system resource ID (UUID)
        in: path
        name: productId
        required: true
        type: string
      - description: Storage destination map and balancing metrics delta values
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inventory.AdjustStockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/inventory.StockLevelResponse'
        "400":
          description: Malformed route parameters or tracking payload errors
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Target unique identification index resource missing
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Balancing step rejected because final allocation would fall
            below zero
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Adjust product stock level
      tags:
      - inventory
  /v1/warehouses:
    get:
      description: Returns a full list of storage locations associated with the active
        tenant.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/inventory.WarehouseResponse'
            type: array
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal service storage lookup engine failure
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all warehouses
      tags:
      - inventory
    post:
      consumes:
      - application/json
      description: Deploys a distinct inventory tracking location workspace for the
        tenant.
      parameters:
      - description: Warehouse creation parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/inventory.CreateWarehouseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/inventory.WarehouseResponse'
        "400":
          description: Invalid payload or request processing error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new warehouse
      tags:
      - inventory
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
