basePath: /v1
definitions:
  auth.AuthResponse:
    properties:
      role:
        type: string
      tenant_id:
        type: string
      token:
        type: string
      user_id:
        type: string
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  auth.SignupRequest:
    properties:
      business_name:
        type: string
      email:
        type: string
      password:
        type: string
    type: object
  billing.PlanResponse:
    properties:
      billing_interval:
        example: monthly
        type: string
        x-nullable: true
      max_orders_per_month:
        example: 100
        type: integer
        x-nullable: true
      max_products:
        example: 50
        type: integer
        x-nullable: true
      max_users:
        description: null = unlimited
        example: 3
        type: integer
        x-nullable: true
      name:
        example: free
        type: string
      price_amount:
        example: 0
        type: number
      price_currency:
        example: NGN
        type: string
    type: object
  billing.UsageResponse:
    properties:
      orders_cap:
        example: 100
        type: integer
        x-nullable: true
      orders_used:
        example: 42
        type: integer
      plan_name:
        example: free
        type: string
      products_cap:
        example: 50
        type: integer
        x-nullable: true
      products_used:
        example: 12
        type: integer
      users_cap:
        example: 3
        type: integer
        x-nullable: true
      users_used:
        example: 2
        type: integer
    type: object
  tenancy.TenantResponse:
    properties:
      created_at:
        type: string
      name:
        type: string
      tenant_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Multi-tenant REP system for OneDesk.
  title: OneDesk API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Verifies user credentials and issues a JWT access token.
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: invalid email or password
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Authenticate user
      tags:
      - auth
  /billing/usage:
    get:
      description: Fetches real-time transaction, item tracking, and staff identity
        usage statistics against plan cap thresholds.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/billing.UsageResponse'
        "401":
          description: missing valid tenant validation credentials
          schema:
            additionalProperties:
              type: string
            type: object
        "402":
          description: plan metric consumption limitation ceiling reached
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal service persistence layer failure
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get tenant quota consumption
      tags:
      - billing
  /plans:
    get:
      description: Returns a matrix layout of all structural subscription plan capabilities
        and resource limits.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/billing.PlanResponse'
            type: array
        "500":
          description: internal server error context details
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List pricing tier catalogs
      tags:
      - billing
  /tenants:
    post:
      consumes:
      - application/json
      description: Creates a new business tenant profile along with its initial root
        admin account.
      parameters:
      - description: Signup Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: invalid request body / validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: email already registered
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new tenant
      tags:
      - auth
  /tenants/me:
    get:
      description: Retrieves structural information about the authenticated user's
        tenant account context.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/tenancy.TenantResponse'
        "401":
          description: missing tenant context / unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get current tenant profile
      tags:
      - tenancy
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
